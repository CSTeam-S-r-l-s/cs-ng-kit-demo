<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>cs-ng-kit demo</title>
  <script>
    // Redirect SPA routes to index.html
    // GitHub Pages returns 404.html for unknown paths — this script
    // converts the path into a query string so index.html can restore it.
    var pathSegmentsToKeep = 1; // 1 for project pages (/<repo-name>/...)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
